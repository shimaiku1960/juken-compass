services:
  db:
    image: mysql:8.4
    container_name: juken-map-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: juken_map
      MYSQL_USER: juken
      MYSQL_PASSWORD: jukenpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: juken-map-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://juken:jukenpassword@db:3306/juken_map?allowPublicKeyRetrieval=true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: